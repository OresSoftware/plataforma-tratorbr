version: "3.9"

volumes:
  images: {} 

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - images:/usr/share/nginx/html/images
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      LOGO_DIR: /images/manufacturer
    volumes:
      - images:/images
    ports:
      - "3000:3000"