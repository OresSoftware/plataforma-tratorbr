version: "3.9"

volumes:
  logos: {}

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # build do front (ajuste se seu build sai em ./frontend/dist)
      - ./frontend/dist:/usr/share/nginx/html:ro
      # volume compartilhado para as logos, servido em /images/manufacturer
      - logos:/usr/share/nginx/html/images/manufacturer
      # config opcional de nginx (se houver)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      LOGO_DIR: /logos
      # demais envs…
    volumes:
      - logos:/logos
    ports:
      - "3000:3000"
