server {
    listen 80;
    server_name www.tratorbr.com.br tratorbr.com.br;

    # Redirecionar HTTP para HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.tratorbr.com.br tratorbr.com.br;

    # Certificados SSL (você precisa configurar estes caminhos)
    # ssl_certificate /etc/nginx/certs/your-cert.crt;
    # ssl_certificate_key /etc/nginx/certs/your-key.key;

    # Configurações SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Redirecionar www para sem www (ou remova se quiser manter www)
    # if ($server_name = "www.tratorbr.com.br") {
    #     return 301 https://tratorbr.com.br$request_uri;
    # }

    # Redirecionar sem www para www (RECOMENDADO - deixe assim)
    if ($server_name = "tratorbr.com.br") {
        return 301 https://www.tratorbr.com.br$request_uri;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend estático
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Imagens de fabricantes
    location /images/manufacturer/ {
        alias /usr/share/nginx/html/images/manufacturer/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API - proxy para backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /healthz {
        proxy_pass http://backend:3000;
        access_log off;
    }

    # Negar acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
